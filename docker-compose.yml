services:

  nginx:
    image: nginx:stable-alpine
    container_name: preflop_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - postgres

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: preflop_php
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend

  postgres:
    image: postgres:16
    container_name: preflop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: preflop_ranges
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    image: node:22-alpine
    container_name: preflop_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
